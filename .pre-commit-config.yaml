default_install_hook_types: [pre-commit, pre-push, commit-msg]
default_stages: [pre-commit]
fail_fast: false

repos:
  - repo: local
    hooks:
      - id: lint-fix
        name: make lint-fix
        entry: make lint-fix
        language: system
        types: [python]
        pass_filenames: false
      - id: format
        name: make format
        entry: make format
        language: system
        types: [python]
        pass_filenames: false
      - id: lock-check
        name: make lock-check
        entry: make lock-check
        language: system
        files: ^(pyproject\.toml|uv\.lock)$
        pass_filenames: false
      - id: check
        name: make check
        entry: make check
        language: system
        stages: [pre-push]
        always_run: true
        pass_filenames: false

      - id: conventional-commit
        name: Conventional Commits (project rules)
        entry: python scripts/hooks/check_conventional_commit.py
        language: system
        stages: [commit-msg]
