name: Feature request
description: Propose a new tool, option, or behaviour.
title: "feat: <short summary>"
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for proposing a feature. For open-ended design questions, prefer
        Discussions; file an issue here when you have a concrete request.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do that you cannot do today?
      placeholder: I want to ... but the current browser_* tools do not expose ...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Concrete shape of the API, tool, or behaviour you have in mind.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why they fall short.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, references, or prior art.

  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
