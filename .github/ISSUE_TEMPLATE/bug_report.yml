name: Bug report
description: Something is broken or behaves unexpectedly.
title: "bug: <short summary>"
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill in the fields below so we can
        reproduce it quickly.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of what you observed.
      placeholder: "Calling browser_navigate returned `error_type: navigation_failed` with ..."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
      placeholder: The navigation should have returned status ok with the final URL ...
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: The exact sequence of tool calls (or code) that triggers the bug.
      render: text
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: Check `pyproject.toml` or run `pip show justpen-browser-mcp`.
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      description: Output of `python --version`.
      placeholder: "3.13.1"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "macOS 15.3 / Ubuntu 24.04 / Windows 11"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Relevant server logs. Redact anything sensitive (cookies, tokens).
      render: text

  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
        - label: I ran the latest released version (or reproduced on `main`).
          required: true
