name: Dep audit

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  audit:
    name: pip-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Install Python
        run: uv python install 3.13
      - name: Sync dev group
        run: uv sync --locked --group dev
      - name: make audit
        run: make audit
