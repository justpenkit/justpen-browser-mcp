name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    name: check (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: "24"
          cache: "npm"
      - name: Install Python
        run: uv python install ${{ matrix.python-version }}
      - name: Sync dev group
        run: uv sync --locked --group dev
      - name: npm install (prettier toolchain)
        run: npm ci --no-audit --no-fund
      - name: make check
        run: make check
      - name: make docs-build
        run: make docs-build
      - name: Link check (lychee)
        uses: lycheeverse/lychee-action@v2.8.0
        with:
          args: --no-progress --verbose --offline --root-dir "${{ github.workspace }}/docs/dist" 'docs/dist/**/*.html'
          fail: true
